<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn JS - 22_Temperature_Conversion_Program</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main">
        <h2 id="heading">Temperature conversion:</h2>
        <input type="number" id="tempInput">

        <div id="convert">
            <div>
                <input type="radio" name="convert" id="celToFar">
                <label for="celTofar">Celsius -> Fahrenheit</label>
            </div>

            <div>
                <input type="radio" name="convert" id="farToCel">
                <label for="farToCel">Fahrenheit -> Celsius</label>
            </div>
        </div>

        <button id="submit">Submit</button>

        <h3 id="output"></h3>
    </div>

    <script src="script.js"></script>
</body>
</html>
